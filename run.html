<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Infinite Run 3D - CDN</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #070914;
      color: white;
      font-family: Arial, sans-serif;
      user-select: none;
    }
    canvas { display: block; }
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(0,0,0,.38);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
      font-weight: 800;
      line-height: 1.55;
    }
    #center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(520px, calc(100vw - 34px));
      padding: 24px;
      text-align: center;
      border-radius: 20px;
      background: rgba(0,0,0,.52);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 20px 70px rgba(0,0,0,.35);
      pointer-events: auto;
    }
    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 13px 22px;
      color: white;
      font-weight: 900;
      background: linear-gradient(135deg, #7c5cff, #00d4ff);
      box-shadow: 0 12px 30px rgba(0,212,255,.24);
    }
    .hint { opacity: .82; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="hud">
      Score: <span id="score">0</span><br>
      Best: <span id="best">0</span><br>
      Speed: <span id="speed">1.0x</span>
    </div>
    <div id="center">
      <h1>Infinite Run 3D</h1>
      <p>Lari sejauh mungkin, kumpulkan koin, dan hindari rintangan.</p>
      <p class="hint">Kontrol: A/D atau panah kiri/kanan untuk pindah jalur. Space / panah atas / tap untuk lompat.</p>
      <button id="startBtn">Mulai Game</button>
    </div>
  </div>

  <!-- Library 3D dari CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- Library SFX dari CDN -->
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>

  <script>
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const speedEl = document.getElementById("speed");
    const center = document.getElementById("center");
    const startBtn = document.getElementById("startBtn");

    let scene, camera, renderer;
    let player, road, clock;
    let running = false;
    let gameOver = false;

    let score = 0;
    let best = Number(localStorage.getItem("infiniteRunBest") || 0);
    let speed = 0.18;
    let spawnTimer = 0;
    let coinTimer = 0;

    const lanes = [-2.2, 0, 2.2];
    let currentLane = 1;
    let targetX = lanes[currentLane];
    let vy = 0;
    let onGround = true;

    const obstacles = [];
    const coins = [];
    const roadMarks = [];

    const sfx = {
      jump: new Howl({ src: ["https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"], volume: .35 }),
      coin: new Howl({ src: ["https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"], volume: .42 }),
      crash: new Howl({ src: ["https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"], volume: .5 }),
      start: new Howl({ src: ["https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"], volume: .35 })
    };

    init();
    animate();

    function init() {
      bestEl.textContent = best;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x080a1a);
      scene.fog = new THREE.Fog(0x080a1a, 12, 42);

      camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 100);
      camera.position.set(0, 5.2, 8.2);
      camera.lookAt(0, 1, -7);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      scene.add(new THREE.AmbientLight(0xffffff, .7));

      const light = new THREE.DirectionalLight(0xffffff, 1.4);
      light.position.set(3, 8, 4);
      scene.add(light);

      const neon = new THREE.PointLight(0x00d4ff, 2.2, 30);
      neon.position.set(0, 2.5, 3);
      scene.add(neon);

      makeRoad();
      makePlayer();
      makeDecor();

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", keyDown);
      window.addEventListener("pointerdown", tapControl);

      startBtn.addEventListener("click", startGame);
    }

    function makeRoad() {
      road = new THREE.Mesh(
        new THREE.BoxGeometry(8.2, .25, 90),
        new THREE.MeshStandardMaterial({ color: 0x111832, roughness: .55, metalness: .12 })
      );
      road.position.set(0, -0.15, -22);
      scene.add(road);

      const sideMat = new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x003344, emissiveIntensity: .7 });
      for (const x of [-4.25, 4.25]) {
        const side = new THREE.Mesh(new THREE.BoxGeometry(.13, .08, 90), sideMat);
        side.position.set(x, .08, -22);
        scene.add(side);
      }

      const markMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x222244, emissiveIntensity: .22 });
      for (let i = 0; i < 26; i++) {
        const mark = new THREE.Mesh(new THREE.BoxGeometry(.18, .05, 1.4), markMat);
        mark.position.set(-1.1, .04, -i * 3.5);
        scene.add(mark);
        roadMarks.push(mark);

        const mark2 = mark.clone();
        mark2.position.x = 1.1;
        scene.add(mark2);
        roadMarks.push(mark2);
      }
    }

    function makePlayer() {
      player = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(.9, 1.15, .65),
        new THREE.MeshStandardMaterial({ color: 0x7c5cff, roughness: .28, metalness: .25 })
      );
      body.position.y = .75;
      player.add(body);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(.42, 24, 16),
        new THREE.MeshStandardMaterial({ color: 0x00d4ff, roughness: .25, metalness: .2 })
      );
      head.position.y = 1.55;
      player.add(head);

      player.position.set(0, 0, 2.2);
      scene.add(player);
    }

    function makeDecor() {
      const matA = new THREE.MeshStandardMaterial({ color: 0x242b55, roughness: .6 });
      const matB = new THREE.MeshStandardMaterial({ color: 0x162242, roughness: .65 });
      for (let i = 0; i < 40; i++) {
        const h = 1 + Math.random() * 4;
        const box = new THREE.Mesh(new THREE.BoxGeometry(.8 + Math.random(), h, .8 + Math.random()), i % 2 ? matA : matB);
        const side = Math.random() > .5 ? 1 : -1;
        box.position.set(side * (5.8 + Math.random() * 4), h / 2 - .1, -Math.random() * 80);
        scene.add(box);
      }
    }

    function startGame() {
      center.style.display = "none";
      running = true;
      gameOver = false;
      score = 0;
      speed = 0.18;
      spawnTimer = 0;
      coinTimer = 0;
      sfx.start.play();
      Howler.ctx && Howler.ctx.resume && Howler.ctx.resume();
    }

    function keyDown(e) {
      if (!running && !gameOver && e.code !== "Enter") return;

      if (e.code === "ArrowLeft" || e.code === "KeyA") moveLane(-1);
      if (e.code === "ArrowRight" || e.code === "KeyD") moveLane(1);
      if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") jump();
      if (e.code === "Enter" && !running) location.reload();
    }

    function tapControl(e) {
      if (!running) return;
      const x = e.clientX / innerWidth;
      if (x < .33) moveLane(-1);
      else if (x > .66) moveLane(1);
      else jump();
    }

    function moveLane(dir) {
      currentLane = Math.max(0, Math.min(2, currentLane + dir));
      targetX = lanes[currentLane];
    }

    function jump() {
      if (!onGround) return;
      vy = .26;
      onGround = false;
      sfx.jump.play();
    }

    function spawnObstacle() {
      const lane = Math.floor(Math.random() * 3);
      const obstacle = new THREE.Mesh(
        new THREE.BoxGeometry(1.15, 1.15, 1.15),
        new THREE.MeshStandardMaterial({ color: 0xff3d71, roughness: .28, metalness: .2, emissive: 0x330010, emissiveIntensity: .45 })
      );
      obstacle.position.set(lanes[lane], .55, -32);
      obstacle.userData = { lane };
      scene.add(obstacle);
      obstacles.push(obstacle);
    }

    function spawnCoin() {
      const lane = Math.floor(Math.random() * 3);
      const coin = new THREE.Mesh(
        new THREE.TorusGeometry(.32, .09, 12, 28),
        new THREE.MeshStandardMaterial({ color: 0xffd166, roughness: .22, metalness: .55, emissive: 0x5b3500, emissiveIntensity: .5 })
      );
      coin.position.set(lanes[lane], 1.05, -30);
      coin.rotation.x = Math.PI / 2;
      scene.add(coin);
      coins.push(coin);
    }

    function update(dt) {
      if (!running) return;

      score += dt * 32;
      speed += dt * 0.004;
      scoreEl.textContent = Math.floor(score);
      speedEl.textContent = (speed / 0.18).toFixed(1) + "x";

      player.position.x += (targetX - player.position.x) * .18;

      vy -= .012;
      player.position.y += vy;
      if (player.position.y <= 0) {
        player.position.y = 0;
        vy = 0;
        onGround = true;
      }

      player.rotation.z = (targetX - player.position.x) * -.08;
      player.rotation.x = onGround ? Math.sin(performance.now() * .012) * .035 : -.18;

      roadMarks.forEach(mark => {
        mark.position.z += speed * 1.35;
        if (mark.position.z > 5) mark.position.z -= 90;
      });

      spawnTimer -= dt;
      coinTimer -= dt;

      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = Math.max(.55, 1.25 - speed * 2.1) + Math.random() * .45;
      }

      if (coinTimer <= 0) {
        spawnCoin();
        coinTimer = .7 + Math.random() * .8;
      }

      updateObstacles();
      updateCoins();

      camera.position.x += (player.position.x * .16 - camera.position.x) * .05;
      camera.lookAt(player.position.x * .08, 1, -7);
    }

    function updateObstacles() {
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.position.z += speed;
        o.rotation.x += .025;
        o.rotation.y += .018;

        if (
          Math.abs(o.position.z - player.position.z) < .7 &&
          Math.abs(o.position.x - player.position.x) < .72 &&
          player.position.y < .75
        ) {
          endGame();
          return;
        }

        if (o.position.z > 7) {
          scene.remove(o);
          obstacles.splice(i, 1);
        }
      }
    }

    function updateCoins() {
      for (let i = coins.length - 1; i >= 0; i--) {
        const c = coins[i];
        c.position.z += speed;
        c.rotation.z += .08;

        if (
          Math.abs(c.position.z - player.position.z) < .75 &&
          Math.abs(c.position.x - player.position.x) < .75 &&
          Math.abs(c.position.y - (player.position.y + 1)) < 1.1
        ) {
          score += 75;
          sfx.coin.play();
          scene.remove(c);
          coins.splice(i, 1);
          continue;
        }

        if (c.position.z > 7) {
          scene.remove(c);
          coins.splice(i, 1);
        }
      }
    }

    function endGame() {
      running = false;
      gameOver = true;
      sfx.crash.play();

      const finalScore = Math.floor(score);
      if (finalScore > best) {
        best = finalScore;
        localStorage.setItem("infiniteRunBest", best);
      }

      bestEl.textContent = best;
      center.innerHTML = `
        <h1>Game Over</h1>
        <p>Score: <b>${finalScore}</b><br>Best: <b>${best}</b></p>
        <p class="hint">Tekan Enter atau klik tombol untuk main lagi.</p>
        <button onclick="location.reload()">Main Lagi</button>
      `;
      center.style.display = "block";
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), .033);
      update(dt);
      renderer.render(scene, camera);
    }

    function resize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }
  </script>
</body>
</html>
